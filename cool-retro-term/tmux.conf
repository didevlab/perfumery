# ~/.tmux.conf — bundled with the perfumery "cool-retro-term" recipe.
#
# cool-retro-term is a CRT terminal emulator with no native tabs or splits.
# tmux adds those inside the CRT window. This config keeps the default prefix
# (Ctrl+b) and adds intuitive, mouse-friendly splits and pane navigation.

# Mouse support: click to focus a pane, drag borders to resize, scroll for
# scrollback, click windows in the status bar to switch.
set -g mouse on

# Splits:
#   prefix + -   split the current pane horizontally (new pane BELOW)
#   prefix + \   split the current pane vertically   (new pane to the RIGHT)
# New panes open in the current pane's directory.
unbind '"'
unbind %
bind - split-window -v -c "#{pane_current_path}"
bind \\ split-window -h -c "#{pane_current_path}"

# Pane navigation with prefix + arrow keys.
bind Left  select-pane -L
bind Down  select-pane -D
bind Up    select-pane -U
bind Right select-pane -R

# Quality-of-life defaults.
set -g base-index 1          # windows numbered from 1
setw -g pane-base-index 1    # panes numbered from 1
set -g renumber-windows on   # keep window numbers gap-free after closing one
set -g history-limit 10000   # bigger scrollback buffer
set -sg escape-time 10       # snappier ESC handling
setw -g mode-keys vi         # vi-style keys in copy mode

# Reload this config without restarting tmux: prefix + r
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"
